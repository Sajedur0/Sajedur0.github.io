<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Projects — Sajedur0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+ Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .projects-page { padding: 120px 0 60px; }
      .projects-page .section-head { margin-bottom: 40px; }
      .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 0.875rem; font-weight: 500; margin-bottom: 24px; text-decoration: none; transition: opacity 0.2s; }
      .back-link:hover { opacity: 0.7; }
      .all-projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
      .project-loading { grid-column: 1 / -1; text-align: center; padding: 60px 0; color: var(--ink-muted); font-size: 0.875rem; }
      @media (max-width: 900px) { .all-projects-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 560px) { .all-projects-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header id="site-header">
      <nav class="nav-container">
        <a href="index.html" class="logo">Sajedur0</a>
        <ul class="nav-links">
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#skills">Skills</a></li>
          <li><a href="index.html#experience">Experience</a></li>
          <li><a href="projects.html" class="active">Projects</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="projects-page">
        <div class="container">
          <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Portfolio
          </a>
          <div class="section-head text-center">
            <h2 class="section-heading">All Projects</h2>
          </div>
          <div class="all-projects-grid" id="all-projects-grid">
            <div class="project-loading">Loading projects...</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p class="text-sm text-muted">&copy; <span id="footer-year"></span> Sajedur0. All rights reserved.</p>
    </footer>

    <script>
      document.getElementById("footer-year").textContent = new Date().getFullYear();

      (function() {
        var grid = document.getElementById("all-projects-grid");

        fetch("https://api.github.com/users/Sajedur0/repos?sort=updated&per_page=100")
          .then(function(res) { return res.json(); })
          .then(function(repos) {
            grid.innerHTML = "";
            repos.forEach(function(repo) {
              var card = document.createElement("a");
              card.href = repo.html_url;
              card.target = "_blank";
              card.rel = "noopener noreferrer";
              card.className = "card project-card";

              var meta = "";
              if (repo.stargazers_count > 0 || repo.forks_count > 0) {
                meta = '<div class="project-meta">';
                if (repo.stargazers_count > 0) meta += '<span class="stars">&#9733; ' + repo.stargazers_count + '</span>';
                if (repo.forks_count > 0) meta += '<span class="forks">' + repo.forks_count + ' forks</span>';
                meta += '</div>';
              }

              var desc = repo.description ? repo.description : "No description available.";
              var lang = repo.language ? repo.language : "N/A";

              card.innerHTML = meta +
                '<h3 class="project-name">' + repo.name + '</h3>' +
                '<p class="text-muted text-sm">' + desc + '</p>' +
                '<span class="tag">' + lang + '</span>';

              grid.appendChild(card);
            });
          })
          .catch(function() {
            grid.innerHTML = '<p class="text-muted text-sm">Failed to load projects.</p>';
          });
      })();
    </script>
  </body>
</html>
